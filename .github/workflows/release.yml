name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build wheels — ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # don't cancel other builds if one fails
      matrix:
        include:
          # ── Linux x86_64 ──────────────────────────────────────────────────
          # glibc 2.17+ (manylinux2014) — broadest compat, CentOS 7 era
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2014"
            artifact: linux-x86_64-manylinux_2_17
          # glibc 2.28+ (Ubuntu 18.04 / Debian Buster era)
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            artifact: linux-x86_64-manylinux_2_28
          # glibc 2.39+ (Ubuntu 24.04 / Debian 13 era)
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_39"
            artifact: linux-x86_64-manylinux_2_39

          # ── Linux aarch64 (ARM64) ─────────────────────────────────────────
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2014"
            artifact: linux-aarch64-manylinux_2_17
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
            artifact: linux-aarch64-manylinux_2_28

          # ── Linux i686 (32-bit x86) ───────────────────────────────────────
          - os: ubuntu-latest
            target: i686
            manylinux: "2014"
            artifact: linux-i686-manylinux_2_17

          # ── Linux armv7 (32-bit ARM, e.g. Raspberry Pi) ──────────────────
          - os: ubuntu-latest
            target: armv7
            manylinux: "2014"
            artifact: linux-armv7-manylinux_2_17

          # ── Linux ppc64le (PowerPC 64-bit LE) ────────────────────────────
          - os: ubuntu-latest
            target: ppc64le
            manylinux: "2014"
            artifact: linux-ppc64le-manylinux_2_17

          # ── Linux s390x (IBM Z) ───────────────────────────────────────────
          - os: ubuntu-latest
            target: s390x
            manylinux: "2014"
            artifact: linux-s390x-manylinux_2_17

          # ── Linux musl (Alpine / musl libc) ──────────────────────────────
          - os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
            artifact: linux-musl-x86_64
          - os: ubuntu-latest
            target: aarch64
            manylinux: musllinux_1_2
            artifact: linux-musl-aarch64

          # ── macOS x86_64 — Intel ("old Macs") ────────────────────────────
          # cross-compiled from ARM runner (macos-13 / macos-12 are retired)
          - os: macos-latest
            target: x86_64
            manylinux: auto
            artifact: macos-x86_64

          # ── macOS ARM64 — Apple Silicon ("new Macs") ─────────────────────
          - os: macos-latest
            target: aarch64
            manylinux: auto
            artifact: macos-aarch64

          # ── Windows x86_64 ────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64
            manylinux: auto
            artifact: windows-x86_64
          # Windows Server 2022 — explicit (windows-latest may change over time)
          - os: windows-2022
            target: x86_64
            manylinux: auto
            artifact: windows-2022-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact }}
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
